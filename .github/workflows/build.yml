name: Build
permissions:
  contents: read

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x86_64-linux
            target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04 # older image for glibc compatibility
            cyclonedx-build: cyclonedx-linux-x64
          - arch: arm64-linux
            target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm # older image for glibc compatibility
            cyclonedx-build: cyclonedx-linux-arm64
      fail-fast: false

    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt update
          sudo apt install -y libssl-dev pkg-config

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive

      - uses: rlespinasse/github-slug-action@9e7def61550737ba68c62d34a32dd31792e3f429

      - uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af
        with:
          target: ${{ matrix.target }}
          override: true

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-build-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-build-

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Cache cargo tools
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-tools-just-cargo-deny-0.18.9-cargo-cyclonedx-0.5

      - name: Install tools
        run: |
          command -v just || cargo install --locked just
          command -v cargo-deny || cargo install --locked cargo-deny@0.18.9
          command -v cargo-cyclonedx || cargo install --locked cargo-cyclonedx@^0.5
          rm -rf ~/.cargo/registry

      - name: Install CycloneDX
        run: |
          mkdir cdx
          wget https://github.com/CycloneDX/cyclonedx-cli/releases/download/v0.27.2/${{ matrix.cyclonedx-build }} -O cyclonedx
          chmod +x cyclonedx

      - name: Install CycloneDX-bun
        run: |
          cd /
          npm i -g @cyclonedx/cyclonedx-npm@4.1.2

      - name: cargo-deny
        run: |
          cargo deny --version
          cargo deny check

      - name: Install UI deps
        run: |
          just bun install --frozen-lockfile

      - name: Build UI
        run: |
          just bun run build

      - name: Generate UI BOM
        run: |
          cd gated-web && NODE_ENV=dev cyclonedx-npm --output-format xml > ../cdx/admin-ui.cdx.xml

      - name: Build
        uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505
        with:
          command: build
          args: --all-features --release --target ${{ matrix.target }}
        env:
          SOURCE_DATE_EPOCH: "0" # for rust-embed determinism
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "--cfg tokio_unstable --remap-path-prefix=$HOME=/reproducible-home --remap-path-prefix=$PWD=/reproducible-pwd"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "--cfg tokio_unstable --remap-path-prefix=$HOME=/reproducible-home --remap-path-prefix=$PWD=/reproducible-pwd"

      - name: Generate Rust BOM
        run: |
          cargo cyclonedx --all-features
          mv gated*/*.cdx.xml cdx/

      - name: Merge BOMs
        run: ./cyclonedx merge --input-files cdx/* --input-format xml --output-format xml > cdx.xml

      - name: Attest build
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          subject-path: target/${{ matrix.target }}/release/gated

      - name: Upload artifact
        uses: actions/upload-artifact@2848b2cda0e5190984587ec6bb1f36730ca78d50
        with:
          name: gated-${{ env.GITHUB_REF_SLUG }}-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/gated

      - name: Upload SBOM
        uses: actions/upload-artifact@2848b2cda0e5190984587ec6bb1f36730ca78d50
        with:
          name: gated-${{ env.GITHUB_REF_SLUG }}-${{ matrix.arch }}.cdx.xml
          path: cdx.xml

      - name: Rename artifacts
        run: |
          mkdir dist
          mv target/${{ matrix.target }}/release/gated dist/gated-${{ env.GITHUB_REF_SLUG }}-${{ matrix.arch }}
          mv cdx.xml dist/gated-${{ env.GITHUB_REF_SLUG }}-${{ matrix.arch }}.cdx.xml

      - name: Upload release
        uses: softprops/action-gh-release@1853d73993c8ca1b2c9c1a7fede39682d0ab5c2a
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          draft: false
          generate_release_notes: true
          files: dist/*
          token: ${{ secrets.GITHUB_TOKEN }}

  config-schema:
    name: Config schema check
    runs-on: ubuntu-24.04

    steps:
      - name: Setup
        run: |
          sudo apt update
          sudo apt install --no-install-recommends -y libssl-dev pkg-config

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-schema-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-schema-

      - name: Cache cargo tools
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-tools-just

      - name: Install tools
        run: |
          command -v just || cargo install --locked just

      - name: Ensure there are no changes in config schema
        run: |
          mkdir gated-web/dist
          just config-schema
          git diff --exit-code config-schema.json
